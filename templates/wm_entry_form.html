<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM Data Entry - Jupiter Prediction Markets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #2a5298;
            background-color: #f8faff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .button-secondary {
            background: #6c757d;
        }

        .button-secondary:hover {
            box-shadow: 0 5px 20px rgba(108, 117, 125, 0.4);
        }

        .button-danger {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 0.9em;
        }

        .button-danger:hover {
            box-shadow: 0 5px 20px rgba(220, 53, 69, 0.4);
        }

        .matches-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .matches-table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        .matches-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
        }

        .matches-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #dee2e6;
        }

        .matches-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .price-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
            display: inline-block;
            margin-right: 5px;
            margin-bottom: 5px;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-state p {
            font-size: 1.1em;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .input-hint {
            font-size: 0.85em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ WM Quoten Tracker</h1>
            <p>Jupiter Prediction Markets Daten erfassen</p>
        </div>

        <div class="card">
            <h2>Neues Spiel hinzufügen</h2>
            <form id="matchForm">
                <div class="form-group">
                    <label for="eventName">Spiel (z.B. "Deutschland vs Frankreich")</label>
                    <input type="text" id="eventName" name="eventName" placeholder="z.B. FIFA WM: Germany vs France" required>
                    <div class="input-hint">Format: Sport/Turnier: Team1 vs Team2</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="yesPrice">JA Quote (dezimal, z.B. 0.66)</label>
                        <input type="number" id="yesPrice" name="yesPrice" min="0" max="1" step="0.01" placeholder="0.66" required>
                    </div>
                    <div class="form-group">
                        <label for="drawPrice">DRAW Quote (optional)</label>
                        <input type="number" id="drawPrice" name="drawPrice" min="0" max="1" step="0.01" placeholder="0.21">
                        <div class="input-hint">Nur bei 3-Way Bets</div>
                    </div>
                    <div class="form-group">
                        <label for="noPrice">NEIN Quote (dezimal, z.B. 0.34)</label>
                        <input type="number" id="noPrice" name="noPrice" min="0" max="1" step="0.01" placeholder="0.34" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Notizen (optional)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="z.B. Halbfinale, gegen Favorit, etc."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit">➕ Spiel hinzufügen</button>
                    <button type="button" class="button-secondary" onclick="exportData()">📥 Als CSV exportieren</button>
                </div>
            </form>

            <div id="alert"></div>
        </div>

        <div class="card">
            <h2>Erfasste Spiele</h2>

            <div id="stats" class="stats"></div>

            <div id="matchesList"></div>
        </div>
    </div>

    <script>
        // Load matches on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadMatches();
        });

        // Form submit
        document.getElementById('matchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                event_name: document.getElementById('eventName').value,
                yes_price: parseFloat(document.getElementById('yesPrice').value),
                no_price: parseFloat(document.getElementById('noPrice').value),
                draw_price: document.getElementById('drawPrice').value ? parseFloat(document.getElementById('drawPrice').value) : null,
                notes: document.getElementById('notes').value,
            };

            try {
                const response = await fetch('/api/matches', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    showAlert('✓ Spiel hinzugefügt!', 'success');
                    document.getElementById('matchForm').reset();
                    loadMatches();
                } else {
                    const error = await response.json();
                    showAlert('Fehler: ' + error.error, 'error');
                }
            } catch (error) {
                showAlert('Fehler: ' + error.message, 'error');
            }
        });

        async function loadMatches() {
            try {
                const response = await fetch('/api/matches');
                const matches = await response.json();

                // Update stats
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <div class="number">${matches.length}</div>
                        <div class="label">Spiele</div>
                    </div>
                    <div class="stat-card">
                        <div class="number">${matches.length > 0 ? (matches.reduce((sum, m) => sum + m.yes_price, 0) / matches.length).toFixed(2) : '0.00'}</div>
                        <div class="label">Ø JA Quote</div>
                    </div>
                `;

                // Render matches
                if (matches.length === 0) {
                    document.getElementById('matchesList').innerHTML = '<div class="empty-state"><p>Noch keine Spiele erfasst</p></div>';
                } else {
                    let html = '<table class="matches-table"><thead><tr><th>Spiel</th><th>Quoten</th><th>Summe</th><th>Notizen</th><th></th></tr></thead><tbody>';
                    matches.forEach((match) => {
                        const prices = [match.yes_price, match.no_price];
                        if (match.draw_price) prices.push(match.draw_price);
                        const sum = prices.reduce((a, b) => a + b, 0).toFixed(3);

                        html += `
                            <tr>
                                <td><strong>${match.event_name}</strong></td>
                                <td>
                                    <span class="price-badge">JA: ${match.yes_price.toFixed(3)}</span>
                                    ${match.draw_price ? `<span class="price-badge">DRAW: ${match.draw_price.toFixed(3)}</span>` : ''}
                                    <span class="price-badge">NEIN: ${match.no_price.toFixed(3)}</span>
                                </td>
                                <td>${sum}</td>
                                <td>${match.notes || '-'}</td>
                                <td><button class="button-danger" onclick="deleteMatch(${match.id})">🗑️</button></td>
                            </tr>
                        `;
                    });
                    html += '</tbody></table>';
                    document.getElementById('matchesList').innerHTML = html;
                }
            } catch (error) {
                showAlert('Fehler beim Laden: ' + error.message, 'error');
            }
        }

        async function deleteMatch(id) {
            if (!confirm('Spiel wirklich löschen?')) return;

            try {
                const response = await fetch(`/api/matches/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAlert('✓ Spiel gelöscht!', 'success');
                    loadMatches();
                } else {
                    showAlert('Fehler beim Löschen', 'error');
                }
            } catch (error) {
                showAlert('Fehler: ' + error.message, 'error');
            }
        }

        async function exportData() {
            try {
                const response = await fetch('/api/export');
                const csv = await response.text();
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'wm_matches.csv';
                a.click();
                showAlert('✓ CSV exportiert!', 'success');
            } catch (error) {
                showAlert('Fehler beim Export: ' + error.message, 'error');
            }
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertDiv.innerHTML = '', 5000);
        }
    </script>
</body>
</html>
